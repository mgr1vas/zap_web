<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAP Shield | Security Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid #334155; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-6 text-white">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tighter">ZAP<span class="text-blue-500 italic">SHIELD</span></h1>
                <p class="text-slate-500 font-medium mt-1 uppercase text-[10px] tracking-widest">Asset Vulnerability Intelligence</p>
            </div>
            <div id="last-update" class="text-[10px] font-bold text-blue-400 bg-blue-500/10 border border-blue-500/20 px-4 py-2 rounded-full uppercase tracking-widest">
                Connecting to node...
            </div>
        </header>

        <main id="dashboard-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></main>

        <section class="mt-24 p-10 rounded-3xl bg-slate-900/40 border border-slate-800 flex flex-col md:flex-row items-center gap-12">
            <img src="https://www.zaproxy.org/images/logo-zap.png" alt="ZAP" class="w-32 drop-shadow-[0_0_20px_rgba(59,130,246,0.3)]">
            <div class="text-center md:text-left">
                <h3 class="text-2xl font-extrabold text-white mb-4 italic uppercase">Active Infrastructure Monitoring</h3>
                <p class="text-slate-400 text-sm leading-relaxed mb-6">Combined ZAP scanning with live broken link detection and WAF auditing for complete security posture.</p>
                <a href="https://zaproxy.org" class="text-blue-500 text-xs font-black uppercase tracking-widest hover:text-blue-400">Security Documentation &rarr;</a>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
